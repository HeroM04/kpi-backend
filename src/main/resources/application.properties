# ── Database PostgreSQL ────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://ep-nameless-band-aojtgspj.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_NPX60ngosZWB

spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# BẮT BUỘC PHẢI CÓ DÒNG NÀY ĐỂ TỰ ĐỘNG TẠO BẢNG LÊN CLOUD
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Server ────────────────────────────────────────────────────────
server.port=8088

# ── JWT Token ─────────────────────────────────────────────────────
# Secret key >= 32 ky tu (256-bit cho HS256)
# PRODUCTION: Thay bang bien moi truong: ${JWT_SECRET}
app.jwt.secret=trilong-kpi-system-super-secret-key-2024-very-secure
# Access token: 1 gio = 3600000ms (ngan lai de secure hon)
app.jwt.expiration-ms=3600000
# Refresh token: 7 ngay = 604800000ms
app.jwt.refresh-expiration-ms=604800000

# ── Storage (Local hoac S3) ────────────────────────────────────────
# Doi thanh "s3" khi deploy production
app.storage.type=local

# Local storage (dung khi app.storage.type=local)
app.storage.local.dir=uploads
app.storage.local.base-url=http://localhost:8080/uploads

# AWS S3 (dung khi app.storage.type=s3)
# PRODUCTION: Dung bien moi truong, khong hardcode credentials
aws.s3.access-key=${AWS_ACCESS_KEY:CHANGE_ME_IN_PROD}
aws.s3.secret-key=${AWS_SECRET_KEY:CHANGE_ME_IN_PROD}
aws.s3.region=${AWS_REGION:ap-southeast-1}
aws.s3.bucket-name=${AWS_BUCKET_NAME:trilong-kpi-uploads}
aws.s3.base-url=${AWS_S3_BASE_URL:https://trilong-kpi-uploads.s3.ap-southeast-1.amazonaws.com}

# ── AWS Rekognition ────────────────────────────────────────────────
app.rekognition.enabled=false
aws.rekognition.similarity-threshold=80.0

# ── File Upload ───────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Swagger UI ────────────────────────────────────────────────────
# Doi thanh false truoc khi deploy production neu muon an
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
# Hien thi day du actuator endpoints
springdoc.show-actuator=false